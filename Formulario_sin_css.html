<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Formulario Básico</title>

</head>

<body>

<h2>Formulario de registro para ser poder ser parte de la comunidad de una grandiosa comunidad</h2>

<form action="Resultado.html">

<label>Nombre: </label><br>

<input type="text" name="nombre"><br><br>

<label>Correo electrónico: </label><br>

<input type="email" name="correo"><br><br>

<label>Contraseña: </label><br>

<input type="password" name="password"><br><br>

<label>Edad: </label><br>

<input type="number" name="edad"><br><br>

<label>Género: </label><br>

<input type="radio" name="genero" value="masculino"> Masculino<br>
<input type="radio" name="genero" value="femenino"> Femenino<br>
<input type="radio" name="genero" value="otro"> Otro<br>

<label>Intereses: </label><br>

<input type="checkbox" name="interes" value="Femtanyl"> Femtanyl<br>
<input type="checkbox" name="interes" value="STOMACH BOOK"> STOMACH BOOK<br>

<input type="checkbox" name="interes" value="Astrid"> Astrid<br><br>

<label>Comentarios: </label><br>

<textarea name="comentarios"></textarea><br><br>

<input type="submit" value="Enviar">
</form>

</body>
</html>
